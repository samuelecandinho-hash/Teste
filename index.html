<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>doação</title>
</head>
<body>
 
    <div class="master">
   <h2>Formulario de adoção</h2>
       
   <form id="formAdocao">
    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" placeholder="Digite seu nome" required>
    <br>
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Digite seu email" required>
        <br>
         <label for="tel">Digite o seu telefone (xxxx-xxxx):</label>
    <input id="tel" name="tel" type="tel"  minlength="8" maxlength="9" required pattern="[0-9]{4}-[0-9]{4}"/>
    <span class="validacao"></span>
        <br>
        <label for="CPF">CPF(xxx.xxx.xxx-xx):</label>
        <input type="text" id="CPF" placeholder="Digite seu CPF" maxlength="14" required pattern="[0-9]{3}.[0-9]{3}.[0-9]{3}-[0-9]{2}"/>
        <span class="validacao"></span>
        <br>
        <label for="idade">Idade:</label>
        <input type="number" id="idade" placeholder="Digite sua idade" required>
        <br>
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Qual é sua cidade" required>
        <br>
    <label for="moradia">Moradia:</label>
    <select name="moradia" id="moradia" required>
        <option value="">Selecione</option>
        <option value="casa"> Casa</option>
        <option value="apartamento">Apartamento</option>
    </select>
   
    <div id="campoCasa">
    <br>
    <label for="quintalSeguro">O quintal é seguro (muros/telas)?</label>
    <select id="quintalSeguro">
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
    </select>
   
</div>
  <div id="campoApto">
    <label for="permitePet">O condomínio permite animais?</label>
    <select id="permitePet">
        <option value="">Selecione</option>
        <option value="sim">Sim</option>
        <option value="nao">Não</option>
    </select>
</div>

    <br>
    <label for="quintal"> Possui Quintal?</label>
    <input type="radio" name="quintal" value="sim" required>sim
    <input type="radio" name="quintal" value="nao">não
   <br>
    <label for="pet"> Já teve um pet antes?</label>
    <input type="radio" name="pet" value="sim" required>sim
    <input type="radio" name="pet" value="nao">não
    <br>
     <label for="hora">quantas horas você vai deixar o pet sozinho por dia:</label>
        <input type="number" id="hora" placeholder="Digite as horas" required>
        <br>
        <label for="motivo">Digite o motivo da adoção</label>
    <textarea id="motivo" name="motivo" minlength="10" rows="1" cols="13" required></textarea>
        <br>
        <label for="check"><a href="https://unilab.edu.br/wp-content/uploads/2021/09/TERMO_DE_DOACAO_P.FISICA.pdf">Aceita os termos de responsabilidade</a></label>
        <input type="checkbox" id="check" required>
        <br>
    <button type="submit">Enviar</button>
   </form>
   </div>


   <script src="script.js"></script>
</body>
</html>
